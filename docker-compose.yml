version: "3.9"
services:
  next:
    stdin_open: true
    tty: true
    build:
      context: .
      target: development
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "5555:5555" # prisma studio
  postgres:
    image: postgres:14
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres

volumes:
  db-data:
