version: "3.9"
services:
  next:
    build:
      context: .
      target: development
    volumes:
      - .:/app
    ports:
      - "3000:3000"
  postgres:
    image: postgres:14
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres

volumes:
  db-data:
