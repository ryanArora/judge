name: "python3"
description: "execute python3"

mode: ONCE
hostname: "judge"
cwd: "/judge"

mount {
    src: "/etc/ld.so.cache"
    dst: "/etc/ld.so.cache"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
}

mount {
    src: "/usr/lib"
    dst: "/usr/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/usr/local/lib"
    dst: "/usr/local/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/judge"
    dst: "/judge"
    is_bind: true
    rw: false
}

mount {
    src: "/usr/local/bin/python3.10"
    dst: "/usr/local/bin/python3.10"
    is_bind: true
    rw: false
}

exec_bin {
  path: "/usr/local/bin/python3.10"
}